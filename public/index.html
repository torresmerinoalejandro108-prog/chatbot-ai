<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chatbot IA</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    #chat {
      width: 80%;
      max-width: 600px;
      height: 400px;
      background: #1e1e1e;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .msg {
      margin: 5px 0;
    }

    .user { color: #4da3ff; }
    .bot { color: #00ff99; }
  </style>
</head>
<body>

<h2>🤖 Chatbot IA</h2>

<div id="chat"></div>

<input id="msg" placeholder="Escribe algo...">
<button onclick="send()">Enviar</button>

<script>
async function send() {
  const input = document.getElementById("msg");
  const text = input.value;

  if (!text) return;

  document.getElementById("chat").innerHTML +=
    `<div class="msg user">Tú: ${text}</div>`;

  const res = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  document.getElementById("chat").innerHTML +=
    `<div class="msg bot">IA: ${data.reply}</div>`;

  input.value = "";
}
</script>

</body>
</html>
