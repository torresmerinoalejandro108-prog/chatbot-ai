<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 💙 PWA MANIFEST -->
<link rel="manifest" href="manifest.json">

<title>Intel AI Chat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

#app{
width:420px;
height:650px;
background:#111827;
border-radius:16px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 0 30px rgba(0,113,197,0.4);
}

header{
background:#0071c5;
padding:15px;
text-align:center;
font-weight:bold;
}

#chat{
flex:1;
padding:10px;
overflow-y:auto;
}

.msg{
margin:8px 0;
padding:10px;
border-radius:10px;
max-width:80%;
}

.user{
background:#0071c5;
margin-left:auto;
}

.bot{
background:#1f2937;
margin-right:auto;
}

#inputArea{
display:flex;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
}

button{
background:#0071c5;
color:white;
border:none;
padding:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="app">
<header>💙 Intel AI Assistant</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Escribe tu consulta...">
<button onclick="send()">Enviar</button>
</div>
</div>

<script>
const chat = document.getElementById("chat");

const sessionId = crypto.randomUUID();

function addMsg(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

async function send(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

addMsg(text,"user");
input.value="";

addMsg("Pensando...", "bot");

const res=await fetch("http://localhost:3000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text, sessionId})
});

const data=await res.json();

chat.lastChild.remove();
addMsg(data.reply,"bot");
}
</script>

</body>
</html>
